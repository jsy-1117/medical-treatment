spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      schema-locations: classpath:test-schema.sql
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      password: root
  cache:
    type: simple

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: test-secret-key-for-jwt-unit-testing-only-not-for-production
  expiration: 86400000

deepseek:
  api-key: test-key
  model: deepseek-chat
  api-url: https://api.deepseek.com/v1/chat/completions
  max-tokens: 2048
  temperature: 0.7
  doctor-temperature: 0.3
  system-prompt: "test system prompt for unit testing"
  doctor-system-prompt: "test doctor system prompt for unit testing"
